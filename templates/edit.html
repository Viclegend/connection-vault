<!DOCTYPE html>
<html lang="zh-TW" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <title>編輯 - 連線資訊庫</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-secondary text-white">
                    <h4 class="mb-0">✏️ 編輯設備：{{ device['device_name'] }}</h4>
                </div>
                <div class="card-body">
                    <form action="/edit/{{ device['id'] }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label">所屬客戶</label>
                            <select name="client_id" class="form-select" required>
                                {% for client in clients %}
                                <option value="{{ client['id'] }}" {% if client['id'] == device['client_id'] %}selected{% endif %}>
                                    {{ client['name'] }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">設備名稱</label>
                            <input type="text" name="device_name" class="form-control" value="{{ device['device_name'] }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">IP 位址</label>
                            <input type="text" name="ip_address" class="form-control" value="{{ device['ip_address'] }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">連線方式</label>
                            <input type="text" name="conn_method" class="form-control" value="{{ device['conn_method'] }}">
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-primary">帳號</label>
                                <input type="text" name="username" class="form-control border-primary" value="{{ device['username'] }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-danger">密碼</label>
                                <input type="password" name="password" class="form-control border-danger font-monospace" value="{{ device['password'] }}">
                            </div>
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <a href="/" class="btn btn-secondary">取消返回</a>
                            <button type="submit" class="btn btn-success px-5">儲存變更</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-bs-theme', 'dark');
        }
    </script>
</body>
</html>
